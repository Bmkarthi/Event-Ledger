version: '3.8'

services:
  account-service:
    build:
      context: ./account-service
      dockerfile: Dockerfile
    container_name: account-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/accounts/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - event-ledger-network

  event-gateway-api:
    build:
      context: ./event-gateway-api
      dockerfile: Dockerfile
    container_name: event-gateway-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8080
      - ACCOUNT_SERVICE_URL=http://account-service:8081
    depends_on:
      account-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/events/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - event-ledger-network

networks:
  event-ledger-network:
    driver: bridge

